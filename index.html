<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KayGrafix</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="icons/favicon.png">
    <style>

        /* ─── RESET ─── */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --gold:       #d3af37;
            --gold-light: #f0cc55;
            --bg:         #080808;
            --text:       #f5f1e8;
            --muted:      rgba(245,241,232,0.45);
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Open Sans', sans-serif;
            color: var(--text);
        }

        /* ─── CANVAS (geometric shapes) ─── */
        #canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ─── RADIAL GLOW ─── */
        .glow {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(
                ellipse 70% 60% at 50% 50%,
                rgba(211,175,55,0.07) 0%,
                transparent 70%
            );
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%,100% { opacity: 0.6; }
            50%      { opacity: 1; }
        }

        /* ─── CONTENT ─── */
        .stage {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 40px 20px;
        }

        /* ICON */
        .wlc-icon {
            width: clamp(80px, 14vw, 130px);
            height: clamp(80px, 14vw, 130px);
            border-radius: 50%;
            object-fit: cover;
            opacity: 0;
            transform: translateY(-30px) scale(0.85);
            animation: dropIn 0.9s cubic-bezier(0.34,1.3,0.64,1) 0.3s forwards;
            filter: drop-shadow(0 0 30px rgba(211,175,55,0.35));
        }

        /* LOGO */
        .wlc-logo {
            margin-top: 24px;
            width: clamp(140px, 28vw, 260px);
            opacity: 0;
            transform: translateY(20px);
            animation: riseIn 0.8s ease 0.85s forwards;
            filter: drop-shadow(0 0 20px rgba(211,175,55,0.2));
        }

        /* TAGLINE */
        .wlc-tagline {
            margin-top: 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.68rem, 2vw, 0.9rem);
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--muted);
            opacity: 0;
            animation: riseIn 0.8s ease 1.3s forwards;
        }

        /* DIVIDER */
        .wlc-divider {
            margin-top: 40px;
            width: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            animation: expandLine 1s ease 1.7s forwards;
        }

        @keyframes expandLine {
            to { width: clamp(160px, 30vw, 300px); }
        }

        /* CTA BUTTON */
        .wlc-btn {
            margin-top: 44px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 16px 36px;
            border: 1px solid var(--gold);
            border-radius: 60px;
            text-decoration: none;
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.72rem, 1.8vw, 0.85rem);
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            background: transparent;
            opacity: 0;
            transform: translateY(16px);
            animation: riseIn 0.8s ease 2s forwards;
            transition: background 0.4s ease, color 0.4s ease,
                        box-shadow 0.4s ease, transform 0.3s ease,
                        gap 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* shimmer sweep on hover */
        .wlc-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg,
                transparent 0%, rgba(211,175,55,0.18) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .wlc-btn:hover::before { transform: translateX(100%); }

        .wlc-btn:hover {
            background: rgba(211,175,55,0.1);
            box-shadow: 0 0 40px rgba(211,175,55,0.2), inset 0 0 20px rgba(211,175,55,0.05);
            color: var(--gold);
            transform: translateY(-3px);
            gap: 20px;
        }

        /* ARROW SVG */
        .arrow-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(211,175,55,0.5);
            transition: border-color 0.3s ease, background 0.3s ease;
            flex-shrink: 0;
        }

        .wlc-btn:hover .arrow-wrap {
            background: var(--gold);
            border-color: var(--gold);
        }

        .wlc-btn:active .arrow-wrap {
            background: var(--gold-light);
            border-color: var(--gold-light);
        }

        .arrow-wrap svg {
            transition: transform 0.3s ease;
        }

        .wlc-btn:hover .arrow-wrap svg path,
        .wlc-btn:active .arrow-wrap svg path {
            stroke: #0b0b0b;
        }

        .arrow-wrap svg path {
            transition: stroke 0.3s ease;
        }

        .wlc-btn:hover .arrow-wrap svg {
            transform: translateX(3px);
        }

        /* CORNER MARKS */
        .corner {
            position: fixed;
            width: 40px;
            height: 40px;
            opacity: 0;
            animation: fadeCorner 1s ease 2.2s forwards;
        }
        .corner-tl { top: 28px; left: 28px;
            border-top: 1px solid rgba(211,175,55,0.35);
            border-left: 1px solid rgba(211,175,55,0.35); }
        .corner-tr { top: 28px; right: 28px;
            border-top: 1px solid rgba(211,175,55,0.35);
            border-right: 1px solid rgba(211,175,55,0.35); }
        .corner-bl { bottom: 28px; left: 28px;
            border-bottom: 1px solid rgba(211,175,55,0.35);
            border-left: 1px solid rgba(211,175,55,0.35); }
        .corner-br { bottom: 28px; right: 28px;
            border-bottom: 1px solid rgba(211,175,55,0.35);
            border-right: 1px solid rgba(211,175,55,0.35); }

        @keyframes dropIn {
            to { opacity:1; transform: translateY(0) scale(1); }
        }
        @keyframes riseIn {
            to { opacity:1; transform: translateY(0); }
        }
        @keyframes fadeCorner {
            to { opacity: 1; }
        }

        /* mobile */
        @media (max-width: 480px) {
            .wlc-btn { padding: 14px 26px; }
            .corner { width: 28px; height: 28px; }
        }

    </style>
</head>
<body>

    <!-- ANIMATED CANVAS -->
    <canvas id="canvas"></canvas>
    <div class="glow"></div>

    <!-- CORNER MARKS -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- MAIN CONTENT -->
    <div class="stage">

        <img class="wlc-icon" src="SVG/icon.svg" alt="KayGFX Icon">
        <img class="wlc-logo" src="SVG/primarylogo.svg" alt="KayGrafixDesign">
        <p class="wlc-tagline">Shaping Visual Identity</p>
        <div class="wlc-divider"></div>

        <a class="wlc-btn" href="portfolio.html" target="_blank">
            <span>To My Portfolio</span>
            <span class="arrow-wrap">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2 7h10M8 3l4 4-4 4"
                          stroke="currentColor" stroke-width="1.5"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </a>

    </div>

    <script>
    /* ─── GEOMETRIC SHAPES CANVAS ─── */
    (function () {
        var canvas = document.getElementById("canvas");
        var ctx    = canvas.getContext("2d");
        var W, H, shapes = [], lines = [], mouse = { x: -999, y: -999 };
        var GOLD  = "rgba(211,175,55,";
        var WHITE = "rgba(245,241,232,";
        var SHAPE_COUNT = 28;
        var LINE_COUNT  = 12;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        /* Track mouse for subtle parallax */
        window.addEventListener("mousemove", function (e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        /* ─ Shape types: triangle, square, hexagon, diamond, ring ─ */
        var TYPES = ["triangle","square","hexagon","diamond","ring"];

        function rand(a, b) { return a + Math.random() * (b - a); }
        function randInt(a, b) { return Math.floor(rand(a, b)); }

        function makeShape() {
            var type  = TYPES[randInt(0, TYPES.length)];
            var size  = rand(10, 52);
            var isGold = Math.random() > 0.5;
            return {
                type:    type,
                x:       rand(0, W),
                y:       rand(0, H),
                size:    size,
                baseSize: size,
                angle:   rand(0, Math.PI * 2),
                rotSpeed: rand(-0.006, 0.006),
                vx:      rand(-0.25, 0.25),
                vy:      rand(-0.25, 0.25),
                alpha:   rand(0.06, 0.22),
                color:   isGold ? GOLD : WHITE,
                filled:  Math.random() > 0.6,
                lineW:   rand(0.5, 1.5),
                pulse:   rand(0, Math.PI * 2),
                pulseSpeed: rand(0.008, 0.022)
            };
        }

        function makeLine() {
            var vert = Math.random() > 0.5;
            return {
                x1: rand(0.05 * W, 0.95 * W),
                y1: rand(0.05 * H, 0.95 * H),
                len: rand(40, 160),
                angle: rand(0, Math.PI * 2),
                alpha: rand(0.04, 0.12),
                speed: rand(0.003, 0.012),
                phase: rand(0, Math.PI * 2),
                color: Math.random() > 0.5 ? GOLD : WHITE
            };
        }

        for (var i = 0; i < SHAPE_COUNT; i++) shapes.push(makeShape());
        for (var j = 0; j < LINE_COUNT;  j++) lines.push(makeLine());

        /* Draw a shape */
        function drawShape(s) {
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(s.angle);

            /* subtle mouse parallax — closer shapes shift more */
            var dx  = (mouse.x - W / 2) * 0.012 * (s.baseSize / 50);
            var dy  = (mouse.y - H / 2) * 0.012 * (s.baseSize / 50);
            ctx.translate(dx, dy);

            var pulse = Math.sin(s.pulse) * 0.12;
            var r = s.size * (1 + pulse);

            ctx.globalAlpha = s.alpha * (0.85 + 0.15 * Math.sin(s.pulse));
            ctx.strokeStyle = s.color + "1)";
            ctx.fillStyle   = s.color + "0.4)";
            ctx.lineWidth   = s.lineW;

            ctx.beginPath();
            switch (s.type) {
                case "triangle":
                    ctx.moveTo(0, -r);
                    ctx.lineTo(r * 0.866, r * 0.5);
                    ctx.lineTo(-r * 0.866, r * 0.5);
                    ctx.closePath();
                    break;
                case "square":
                    ctx.rect(-r * 0.7, -r * 0.7, r * 1.4, r * 1.4);
                    break;
                case "hexagon":
                    for (var k = 0; k < 6; k++) {
                        var a = (Math.PI / 3) * k - Math.PI / 6;
                        k === 0 ? ctx.moveTo(r * Math.cos(a), r * Math.sin(a))
                                : ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
                    }
                    ctx.closePath();
                    break;
                case "diamond":
                    ctx.moveTo(0, -r);
                    ctx.lineTo(r * 0.6, 0);
                    ctx.lineTo(0, r);
                    ctx.lineTo(-r * 0.6, 0);
                    ctx.closePath();
                    break;
                case "ring":
                    ctx.arc(0, 0, r, 0, Math.PI * 2);
                    ctx.globalAlpha = s.alpha * 0.7;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2);
                    break;
            }
            s.filled ? ctx.fill() : ctx.stroke();
            ctx.restore();
        }

        /* Draw floating accent lines */
        function drawLine(l) {
            ctx.save();
            ctx.translate(l.x1, l.y1);
            ctx.rotate(l.angle + Math.sin(l.phase) * 0.3);
            ctx.globalAlpha = l.alpha * (0.6 + 0.4 * Math.sin(l.phase));
            ctx.strokeStyle = l.color + "1)";
            ctx.lineWidth   = 0.8;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(l.len, 0);
            ctx.stroke();
            ctx.restore();
        }

        /* Connect nearby shapes with faint lines */
        function drawConnections() {
            var DIST = 120;
            for (var a = 0; a < shapes.length; a++) {
                for (var b = a + 1; b < shapes.length; b++) {
                    var dx  = shapes[a].x - shapes[b].x;
                    var dy  = shapes[a].y - shapes[b].y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < DIST) {
                        ctx.save();
                        ctx.globalAlpha = (1 - dist / DIST) * 0.07;
                        ctx.strokeStyle = GOLD + "1)";
                        ctx.lineWidth   = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(shapes[a].x, shapes[a].y);
                        ctx.lineTo(shapes[b].x, shapes[b].y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        /* ANIMATE */
        function tick() {
            ctx.clearRect(0, 0, W, H);

            drawConnections();
            lines.forEach(function (l) {
                l.phase += l.speed;
                drawLine(l);
            });
            shapes.forEach(function (s) {
                s.angle   += s.rotSpeed;
                s.pulse   += s.pulseSpeed;
                s.x       += s.vx;
                s.y       += s.vy;
                if (s.x < -80)  s.x = W + 80;
                if (s.x > W+80) s.x = -80;
                if (s.y < -80)  s.y = H + 80;
                if (s.y > H+80) s.y = -80;
                drawShape(s);
            });

            requestAnimationFrame(tick);
        }
        tick();
    }());
    </script>

</body>
</html>
